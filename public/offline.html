<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>오프라인 — VEILOR</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#1C1917; color:#E7E5E4; font-family:system-ui,-apple-system,sans-serif; text-align:center; padding:24px; }
    h1 { font-family:serif; font-weight:300; font-size:28px; margin-bottom:8px; color:#E0B48A; }
    p { font-size:14px; color:#9C9590; line-height:1.6; max-width:300px; }
    button { margin-top:20px; padding:10px 24px; border-radius:12px; border:1px solid #E0B48A33; background:#E0B48A0D; color:#E0B48A; font-size:14px; cursor:pointer; }
  </style>
</head>
<body>
  <h1>VEILOR</h1>
  <p>인터넷 연결이 끊어졌습니다.<br/>연결이 복구되면 자동으로 돌아갑니다.</p>
  <button onclick="location.reload()">다시 시도</button>
  <script>
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
