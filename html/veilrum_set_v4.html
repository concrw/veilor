<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veilrum — Set v4</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0E0D0C;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'DM Sans',sans-serif;padding:20px;}
.phone{width:340px;height:720px;background:#1C1917;border-radius:40px;border:1px solid #44403C;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.status-bar{padding:14px 26px 8px;display:flex;justify-content:space-between;flex-shrink:0;}
.s-time{font-size:12px;color:#78716C;}
.s-icons{display:flex;gap:5px;align-items:center;}
.s-dot{width:4px;height:4px;border-radius:50%;background:#57534E;}
.char-bar{flex-shrink:0;padding:8px 20px 9px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #2A2624;}
.tab-name-col{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.tab-title{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:22px;color:#E7E5E4;letter-spacing:.01em;line-height:1;}
.tab-desc{font-size:10px;font-weight:300;color:#57534E;letter-spacing:.02em;}
.ai-pair{display:flex;gap:6px;margin-left:auto;align-items:center;}
.amber-btn{width:28px;height:28px;border-radius:50%;background:#D4A57415;border:1px solid #D4A57444;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;flex-shrink:0;}
.amber-inner{width:17px;height:17px;border-radius:50%;background:#D4A574;}
.amber-pulse{position:absolute;inset:-3px;border-radius:50%;border:1px solid #D4A57418;animation:ap 3s ease-in-out infinite;}
@keyframes ap{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0;transform:scale(1.4)}}
.frost-btn{width:28px;height:28px;border-radius:50%;background:#7BA8C415;border:1px solid #7BA8C444;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;flex-shrink:0;}
.frost-inner{width:17px;height:17px;border-radius:50%;background:#7BA8C4;}
.frost-pulse{position:absolute;inset:-3px;border-radius:50%;border:1px solid #7BA8C418;animation:fp 3.4s ease-in-out infinite .4s;}
@keyframes fp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0;transform:scale(1.4)}}
.section-tabs{flex-shrink:0;display:flex;border-bottom:1px solid #2A2624;padding:0 22px;}
.stab{font-size:11px;font-weight:300;color:#57534E;padding:10px 0;margin-right:20px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;user-select:none;}
.stab.on{color:#C4A355;border-bottom-color:#C4A355;font-weight:400;}
.screen{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* PATTERN VIEW */
.pattern-view{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.pv-intro{flex-shrink:0;padding:12px 20px 10px;border-bottom:1px solid #2A2624;}
.pv-eyebrow{font-size:9px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:#C4A355;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.pv-pulse{width:5px;height:5px;border-radius:50%;background:#C4A355;animation:pvp 2s ease-in-out infinite;}
@keyframes pvp{0%,100%{opacity:1}50%{opacity:.3}}
.pv-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:18px;color:#E7E5E4;line-height:1.45;word-break:keep-all;}
.pv-sub{font-size:10px;font-weight:300;color:#57534E;margin-top:3px;}
.frost-summary{flex-shrink:0;margin:8px 20px 0;background:#7BA8C408;border:1px solid #7BA8C422;border-radius:10px;padding:9px 12px;}
.fsum-name{font-size:9px;color:#7BA8C4;margin-bottom:3px;font-weight:400;letter-spacing:.05em;}
.fsum-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:12.5px;color:#A8A29E;line-height:1.5;word-break:keep-all;}
.pattern-scroll{flex:1;overflow-y:auto;padding:10px 20px 20px;display:flex;flex-direction:column;gap:8px;min-height:0;scrollbar-width:none;}
.pattern-scroll::-webkit-scrollbar{display:none;}
.pattern-card{background:#242120;border:1px solid #3C3835;border-radius:13px;padding:14px 16px;cursor:pointer;transition:all .22s;}
.pattern-card:hover{border-color:#C4A35533;transform:translateY(-1px);}
.pc-zone-row{display:flex;align-items:center;gap:5px;margin-bottom:7px;}
.pc-zone-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.pc-zone-label{font-size:9px;font-weight:400;color:#57534E;letter-spacing:.04em;}
.pc-pattern-title{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:17px;color:#E7E5E4;line-height:1.35;margin-bottom:4px;word-break:keep-all;}
.pc-pattern-desc{font-size:11px;font-weight:300;color:#78716C;line-height:1.5;word-break:keep-all;}
.pc-meta{display:flex;align-items:center;gap:8px;margin-top:8px;}
.pc-from-tag{font-size:9px;font-weight:400;letter-spacing:.05em;color:#3C3835;text-transform:uppercase;padding:2px 6px;border:1px solid #3C3835;border-radius:4px;}
.pc-intensity{display:flex;gap:2px;}
.pc-dot-fill{width:5px;height:5px;border-radius:50%;background:#C4A35566;}
.pc-dot-empty{width:5px;height:5px;border-radius:50%;background:#2A2624;}
.pc-arrow{margin-left:auto;font-size:14px;color:#3C3835;transition:color .2s;}
.pattern-card:hover .pc-arrow{color:#C4A355;}

/* CHOICE VIEW */
.choice-view{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0;}
.spb{flex-shrink:0;padding:8px 20px 9px;border-bottom:1px solid #2A2624;display:flex;align-items:center;gap:9px;cursor:pointer;background:#1E1C1A;transition:background .15s;}
.spb:hover{background:#242120;}
.spb-back{font-size:16px;color:#57534E;flex-shrink:0;line-height:1;}
.spb-zdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.spb-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:13px;color:#A8A29E;flex:1;line-height:1.3;word-break:keep-all;}
.spb-from{font-size:9px;color:#3C3835;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em;}
.frost-bar{flex-shrink:0;padding:8px 20px 8px;display:flex;gap:8px;align-items:flex-start;border-bottom:1px solid #2A2624;}
.fb-av{width:18px;height:18px;border-radius:50%;background:#7BA8C415;border:1px solid #7BA8C444;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.fb-av-in{width:10px;height:10px;border-radius:50%;background:#7BA8C4;}
.fb-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:12.5px;color:#78716C;flex:1;line-height:1.5;word-break:keep-all;}
.fb-name{font-size:9px;color:#3C3835;flex-shrink:0;margin-top:2px;}
.choice-scroll{flex:1;overflow-y:auto;padding:13px 20px 80px;display:flex;flex-direction:column;gap:10px;min-height:0;scrollbar-width:none;}
.choice-scroll::-webkit-scrollbar{display:none;}
.main-q-eyebrow{font-size:9px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:#C4A355;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.mq-pulse{width:5px;height:5px;border-radius:50%;background:#C4A355;animation:mqp 2s ease-in-out infinite;}
@keyframes mqp{0%,100%{opacity:1}50%{opacity:.3}}
.main-q-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:20px;color:#E7E5E4;line-height:1.45;word-break:keep-all;margin-bottom:2px;}
.choice-cards{display:flex;flex-direction:column;gap:8px;}
.choice-card{background:#242120;border:1px solid #3C3835;border-radius:13px;padding:15px 16px;cursor:pointer;transition:all .25s;}
.choice-card:hover{border-color:#C4A35533;}
.choice-card.selected{border-color:#C4A355;background:#C4A3550A;}
.cc-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;}
.cc-title{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:19px;color:#E7E5E4;}
.cc-chk{width:20px;height:20px;border-radius:50%;border:1.5px solid #3C3835;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.choice-card.selected .cc-chk{border-color:#C4A355;background:#C4A355;}
.cc-chk-in{width:7px;height:7px;border-radius:50%;background:#1C1917;opacity:0;transition:opacity .15s;}
.choice-card.selected .cc-chk-in{opacity:1;}
.cc-desc{font-size:11px;font-weight:300;color:#57534E;line-height:1.55;word-break:keep-all;}
.choice-expand{display:none;border-top:1px solid #2A2624;margin-top:12px;padding-top:11px;}
.choice-card.selected .choice-expand{display:block;}
.stage-list{display:flex;flex-direction:column;gap:6px;}
.stage-item{background:#1C1917;border:1px solid #3C3835;border-radius:10px;padding:11px 13px;cursor:pointer;transition:all .2s;}
.stage-item:hover{border-color:#C4A35522;}
.stage-item.done{border-color:#C4A35544;background:#C4A3550A;}
.si-top{display:flex;align-items:center;gap:8px;}
.si-num{width:20px;height:20px;border-radius:50%;border:1.5px solid #3C3835;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:400;color:#57534E;transition:all .2s;}
.stage-item.done .si-num{border-color:#C4A355;background:#C4A355;color:#1C1917;}
.si-lbl{font-size:9px;font-weight:400;letter-spacing:.06em;text-transform:uppercase;color:#57534E;flex-shrink:0;width:34px;}
.si-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:13.5px;color:#E7E5E4;flex:1;line-height:1.3;word-break:keep-all;}
.si-body{display:none;padding-top:9px;margin-top:9px;border-top:1px solid #2A2624;}
.stage-item.open .si-body{display:block;}
.si-body-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:13px;color:#A8A29E;line-height:1.6;word-break:keep-all;margin-bottom:8px;}
.si-note{background:#242120;border-radius:8px;padding:8px 11px;margin-bottom:8px;}
.si-note-lbl{font-size:9px;color:#3C3835;margin-bottom:4px;}
.si-note-ta{width:100%;background:transparent;border:none;outline:none;font-family:'Cormorant Garamond',serif;font-weight:300;font-size:13px;color:#A8A29E;line-height:1.5;resize:none;min-height:38px;}
.si-note-ta::placeholder{color:#3C3835;}
.amber-cmt{background:#D4A5740A;border:1px solid #D4A57422;border-radius:9px;padding:9px 12px;}
.amber-cmt-name{font-size:9px;font-weight:400;letter-spacing:.06em;color:#D4A574;margin-bottom:3px;}
.amber-cmt-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:13px;color:#A8A29E;line-height:1.55;word-break:keep-all;}
.frost-cmt{background:#7BA8C40A;border:1px solid #7BA8C422;border-radius:9px;padding:9px 12px;}
.frost-cmt-name{font-size:9px;font-weight:400;letter-spacing:.06em;color:#7BA8C4;margin-bottom:3px;}
.frost-cmt-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:13px;color:#A8A29E;line-height:1.55;word-break:keep-all;}
.proceed-btn{flex-shrink:0;margin:0 20px 14px;padding:13px 0;border-radius:12px;border:none;background:#C4A355;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;color:#1C1917;cursor:pointer;display:none;}
.proceed-btn.show{display:block;}

/* PRACTICE VIEW */
.practice-view{flex:1;display:none;flex-direction:column;padding:13px 20px 0;overflow:hidden;min-height:0;}
.practice-view.active{display:flex;}
.practice-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;}
.pe-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:16px;color:#57534E;line-height:1.5;}
.pe-btn{padding:9px 20px;border-radius:9px;border:1px solid #C4A35544;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:300;color:#C4A355;cursor:pointer;}
.practice-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.ph-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:99px;border:1px solid #C4A35544;background:#C4A3550A;margin-bottom:7px;}
.ph-badge-dot{width:5px;height:5px;border-radius:50%;background:#C4A355;}
.ph-badge-text{font-size:10px;font-weight:400;color:#C4A355;}
.ph-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:19px;color:#E7E5E4;line-height:1.4;margin-bottom:3px;word-break:keep-all;}
.ph-sub{font-size:11px;font-weight:300;color:#57534E;line-height:1.5;margin-bottom:11px;}
.stage-tracker{flex-shrink:0;display:flex;background:#242120;border-radius:10px;padding:10px 12px;border:1px solid #3C3835;margin-bottom:12px;}
.st-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;}
.st-step:not(:last-child)::after{content:'';position:absolute;right:0;top:9px;width:1px;height:18px;background:#3C3835;}
.st-num{width:18px;height:18px;border-radius:50%;border:1.5px solid #3C3835;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:400;color:#57534E;transition:all .3s;}
.st-step.done .st-num{border-color:#C4A355;background:#C4A355;color:#1C1917;}
.st-step.active .st-num{border-color:#C4A355;color:#C4A355;}
.st-lbl{font-size:9px;font-weight:300;color:#57534E;text-align:center;line-height:1.3;}
.st-step.active .st-lbl,.st-step.done .st-lbl{color:#C4A355;}
.practice-list{flex:1;overflow-y:auto;min-height:0;scrollbar-width:none;display:flex;flex-direction:column;gap:7px;padding-bottom:8px;}
.practice-list::-webkit-scrollbar{display:none;}
.pcard{background:#242120;border:1px solid #3C3835;border-radius:11px;overflow:hidden;flex-shrink:0;transition:border-color .2s;}
.pcard.done{border-color:#C4A35544;background:#C4A3550A;}
.pcard-head{padding:11px 13px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
.pcard-chk{width:20px;height:20px;border-radius:5px;border:1.5px solid #3C3835;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s;}
.pcard.done .pcard-chk{border-color:#C4A355;background:#C4A355;}
.pcard-chk-mark{font-size:10px;color:#1C1917;opacity:0;transition:opacity .15s;}
.pcard.done .pcard-chk-mark{opacity:1;}
.pcard-body{flex:1;}
.pcard-stage{font-size:9px;font-weight:400;letter-spacing:.07em;text-transform:uppercase;color:#57534E;margin-bottom:2px;}
.pcard-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:14px;color:#E7E5E4;line-height:1.4;word-break:keep-all;margin-bottom:2px;}
.pcard-desc{font-size:11px;font-weight:300;color:#57534E;line-height:1.5;word-break:keep-all;}
.pcard-expand{display:none;border-top:1px solid #2A2624;padding:9px 13px;}
.pcard.open .pcard-expand{display:block;}
.pcard-note{background:#1C1917;border-radius:8px;padding:8px 11px;}
.pcard-note-lbl{font-size:9px;color:#3C3835;margin-bottom:4px;}
.pcard-note-ta{width:100%;background:transparent;border:none;outline:none;font-family:'Cormorant Garamond',serif;font-weight:300;font-size:13px;color:#A8A29E;line-height:1.5;resize:none;min-height:38px;}
.pcard-note-ta::placeholder{color:#3C3835;}
.me-invite{background:linear-gradient(135deg,#C4A35508,#1C1917);border:1px solid #C4A35533;border-radius:11px;padding:13px 14px;flex-shrink:0;}
.mi-lbl{font-size:9px;font-weight:400;letter-spacing:.08em;text-transform:uppercase;color:#C4A355;margin-bottom:4px;}
.mi-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:15px;color:#E7E5E4;line-height:1.5;margin-bottom:9px;word-break:keep-all;}
.mi-btn{width:100%;padding:9px 0;border-radius:9px;border:1px solid #C4A35544;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:300;color:#C4A355;cursor:pointer;}

/* COMM VIEW */
.comm-view{flex:1;display:none;flex-direction:column;padding:13px 20px 0;overflow:hidden;min-height:0;}
.comm-view.active{display:flex;}
.comm-note{font-size:10px;font-weight:300;color:#3C3835;margin-bottom:9px;flex-shrink:0;}
.group-list{flex:1;display:flex;flex-direction:column;gap:7px;overflow-y:auto;min-height:0;scrollbar-width:none;padding-bottom:8px;}
.group-list::-webkit-scrollbar{display:none;}
.gcard{background:#242120;border:1px solid #3C3835;border-radius:11px;padding:12px 14px;flex-shrink:0;cursor:pointer;transition:border-color .2s;}
.gcard:hover{border-color:#C4A35533;}
.gcard.matched{border-color:#C4A35555;background:#C4A3550A;}
.gc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:3px;}
.gc-name{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:14px;color:#E7E5E4;line-height:1.3;word-break:keep-all;}
.gc-cnt{font-size:10px;font-weight:300;color:#57534E;flex-shrink:0;}
.gc-desc{font-size:11px;font-weight:300;color:#78716C;line-height:1.5;word-break:keep-all;}
.gc-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.gc-tag{font-size:9px;padding:2px 7px;border-radius:99px;border:1px solid #3C3835;color:#57534E;}
.gc-badge{font-size:9px;padding:2px 7px;border-radius:99px;border:1px solid #C4A35533;color:#C4A355;background:#C4A3550A;}
.gc-entries{border-top:1px solid #2A2624;margin-top:9px;padding-top:8px;display:none;}
.gcard.open .gc-entries{display:block;}
.gc-entry{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:12px;color:#78716C;line-height:1.55;padding:5px 0;border-bottom:1px solid #2A2624;word-break:keep-all;}
.gc-entry:last-child{border-bottom:none;}

/* AI SHEET */
.ai-ov{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:30;opacity:0;pointer-events:none;transition:opacity .3s;border-radius:40px;}
.ai-ov.show{opacity:1;pointer-events:all;}
.ai-sheet{position:absolute;bottom:0;left:0;right:0;background:#1C1917;border-radius:20px 20px 40px 40px;border:1px solid #44403C;border-bottom:none;z-index:31;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:75%;}
.ai-sheet.show{transform:translateY(0);}
.ai-handle{width:32px;height:3px;border-radius:99px;background:#3C3835;margin:10px auto 0;}
.ai-hdr{padding:10px 18px 8px;display:flex;align-items:center;gap:9px;border-bottom:1px solid #2A2624;flex-shrink:0;}
.sav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.sav.amber{background:#D4A57415;border:1px solid #D4A57444;}
.sav.frost{background:#7BA8C415;border:1px solid #7BA8C444;}
.sav-in{width:17px;height:17px;border-radius:50%;}
.sav.amber .sav-in{background:#D4A574;}
.sav.frost .sav-in{background:#7BA8C4;}
.sname{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:15px;color:#E7E5E4;flex:1;}
.srole{font-size:10px;font-weight:300;color:#57534E;}
.sclose{width:26px;height:26px;border-radius:50%;border:1px solid #3C3835;background:transparent;cursor:pointer;color:#57534E;font-size:13px;display:flex;align-items:center;justify-content:center;}
.ai-chat{flex:1;overflow-y:auto;padding:11px 17px;display:flex;flex-direction:column;gap:8px;min-height:0;scrollbar-width:none;}
.ai-chat::-webkit-scrollbar{display:none;}
.amsg{border-radius:11px 11px 11px 3px;padding:10px 13px;flex-shrink:0;}
.amsg.amber{border:1px solid #D4A57422;background:#D4A5740A;}
.amsg.frost{border:1px solid #7BA8C422;background:#7BA8C408;}
.amsg-text{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:14px;color:#E7E5E4;line-height:1.55;word-break:keep-all;}
.amsg-tone{font-size:9px;font-weight:300;margin-top:2px;}
.amsg.amber .amsg-tone{color:#D4A57477;}
.amsg.frost .amsg-tone{color:#7BA8C477;}
.umsg{background:#C4A3550D;border:1px solid #C4A35522;border-radius:11px 11px 3px 11px;padding:9px 13px;align-self:flex-end;max-width:85%;flex-shrink:0;}
.umsg-text{font-size:12px;font-weight:300;color:#A8A29E;line-height:1.6;word-break:keep-all;}
.ai-ibar{flex-shrink:0;padding:7px 13px 13px;border-top:1px solid #2A2624;display:flex;align-items:center;gap:7px;}
.ai-field{flex:1;background:#242120;border:1px solid #3C3835;border-radius:20px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:300;color:#A8A29E;outline:none;}
.ai-field::placeholder{color:#57534E;}
.ai-send{width:28px;height:28px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.ai-send.amber{background:#D4A574;}
.ai-send.frost{background:#7BA8C4;}

/* NAV */
.bottom-nav{flex-shrink:0;background:#1C1917;border-top:1px solid #2A2624;padding:9px 10px 16px;display:flex;justify-content:space-around;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px;border-radius:9px;border:none;background:transparent;}
.nav-dot{width:5px;height:5px;border-radius:50%;background:#3C3835;transition:background .2s,transform .2s;}
.nav-lbl{font-size:11px;font-weight:300;color:#57534E;transition:color .2s;}
.nav-btn.on .nav-dot{background:#C4A355;transform:scale(1.3);}
.nav-btn.on .nav-lbl{color:#C4A355;font-weight:400;}
.nav-btn.on{background:#C4A3550A;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .28s ease both;}

/* Amber/Frost 어텐션 */
@keyframes amber-flash{
  0%{box-shadow:0 0 0 0 rgba(212,165,116,0);transform:scale(1);}
  20%{box-shadow:0 0 0 7px rgba(212,165,116,0.4);transform:scale(1.12);}
  40%{box-shadow:0 0 0 3px rgba(212,165,116,0.15);transform:scale(1.05);}
  60%{box-shadow:0 0 0 9px rgba(212,165,116,0.25);transform:scale(1.08);}
  100%{box-shadow:0 0 0 0 rgba(212,165,116,0);transform:scale(1);}
}
.amber-btn.flashing{animation:amber-flash 1.4s ease-out forwards;}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span class="s-time">9:41</span><div class="s-icons"><div class="s-dot"></div><div class="s-dot"></div><div class="s-dot"></div></div></div>
  <div class="char-bar">
    <div class="tab-name-col"><div class="tab-title">SET</div><div class="tab-desc">이제 뭔가 달라지고 싶어요</div></div>
    <div class="ai-pair">
      <div class="amber-btn" onclick="openSheet('amber')"><div class="amber-pulse"></div><div class="amber-inner"></div></div>
      <div class="frost-btn" onclick="openSheet('frost')"><div class="frost-pulse"></div><div class="frost-inner"></div></div>
    </div>
  </div>
  <div class="ai-ov" id="ai-ov" onclick="closeSheet()"></div>
  <div class="ai-sheet" id="ai-sheet">
    <div class="ai-handle"></div>
    <div class="ai-hdr">
      <div class="sav" id="sav"><div class="sav-in"></div></div>
      <div class="sname" id="sname">엠버</div>
      <div class="srole" id="srole">비서</div>
      <button class="sclose" onclick="closeSheet()">&#x2715;</button>
    </div>
    <div class="ai-chat" id="ai-chat"></div>
    <div class="ai-ibar">
      <input class="ai-field" id="ai-field" placeholder="말해요..."/>
      <button class="ai-send amber" id="ai-send" onclick="sendMsg()">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M6 11V1M1 6l5-5 5 5" stroke="#1C1917" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>
  <div class="section-tabs">
    <div class="stab on" id="stab-sel" onclick="switchSec('pattern',this)">선택</div>
    <div class="stab" id="stab-prac" onclick="switchSec('practice',this)">실천</div>
    <div class="stab" id="stab-comm" onclick="switchSec('community',this)">커뮤니티</div>
  </div>
  <div class="screen">
    <!-- PATTERN VIEW -->
    <div class="pattern-view" id="v-pattern">
      <div class="pv-intro">
        <div class="pv-eyebrow"><div class="pv-pulse"></div>Set</div>
        <div class="pv-title">어떤 고민과 먼저 마주할 건가요?</div>
        <div class="pv-sub">Dig와 Get에서 발견한 패턴들이에요.</div>
      </div>
      <div class="frost-summary"><div class="fsum-name">Frost</div><div class="fsum-text">"3개 패턴이 반복되고 있어요. 첫 번째가 가장 자주 등장했어요."</div></div>
      <div class="pattern-scroll" id="pattern-scroll"></div>
    </div>
    <!-- CHOICE VIEW -->
    <div class="choice-view" id="v-choice">
      <div class="spb" onclick="goBack()">
        <div class="spb-back">←</div>
        <div class="spb-zdot" id="spb-zdot"></div>
        <div class="spb-text" id="spb-text">패턴</div>
        <div class="spb-from" id="spb-from">Get</div>
      </div>
      <div class="frost-bar">
        <div class="fb-av"><div class="fb-av-in"></div></div>
        <div class="fb-text" id="fb-text">"이 패턴은 반복되고 있어요."</div>
        <div class="fb-name">Frost</div>
      </div>
      <div class="choice-scroll">
        <div>
          <div class="main-q-eyebrow"><div class="mq-pulse"></div>Set</div>
          <div class="main-q-text" id="main-q-text">이 패턴과 어떻게 지낼 건가요?</div>
        </div>
        <div class="choice-cards" id="choice-cards"></div>
        <button class="proceed-btn" id="proceed-btn" onclick="goPractice()">실천으로 이어가기</button>
      </div>
    </div>
    <!-- PRACTICE VIEW -->
    <div class="practice-view" id="v-practice">
      <div class="practice-empty" id="prac-empty">
        <div class="pe-text">먼저 어떤 고민과<br>마주할지 선택해주세요.</div>
        <button class="pe-btn" onclick="switchSec('pattern',document.getElementById('stab-sel'))">고민 선택하기</button>
      </div>
      <div class="practice-content" id="prac-content" style="display:none;">
        <div>
          <div class="ph-badge"><div class="ph-badge-dot"></div><div class="ph-badge-text" id="ph-badge">바꿀게요</div></div>
          <div class="ph-title" id="ph-title">패턴을 바꾸는 3단계</div>
          <div class="ph-sub" id="ph-sub">Frost가 트래킹해요.</div>
        </div>
        <div class="stage-tracker">
          <div class="st-step active" id="st1"><div class="st-num">1</div><div class="st-lbl" id="st1l">관찰</div></div>
          <div class="st-step" id="st2"><div class="st-num">2</div><div class="st-lbl" id="st2l">실험</div></div>
          <div class="st-step" id="st3"><div class="st-num">3</div><div class="st-lbl" id="st3l">정착</div></div>
        </div>
        <div class="practice-list" id="prac-list"></div>
      </div>
    </div>
    <!-- COMM VIEW -->
    <div class="comm-view" id="v-comm">
      <div class="comm-note">같은 선택을 한 사람들이에요. 읽는 공간이에요.</div>
      <div class="group-list" id="group-list"></div>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn" onclick="navTo(this)"><div class="nav-dot"></div><div class="nav-lbl">Vent</div></button>
    <button class="nav-btn" onclick="navTo(this)"><div class="nav-dot"></div><div class="nav-lbl">Dig</div></button>
    <button class="nav-btn" onclick="navTo(this)"><div class="nav-dot"></div><div class="nav-lbl">Get</div></button>
    <button class="nav-btn on" onclick="navTo(this)"><div class="nav-dot"></div><div class="nav-lbl">Set</div></button>
    <button class="nav-btn" onclick="navTo(this)"><div class="nav-dot"></div><div class="nav-lbl">Me</div></button>
  </div>
</div>
<script>
var SEL_PAT = null, SEL_CHOICE = null, CUR_SHEET = null;
var HIST = {amber:[],frost:[]};

var PATTERNS = [
  {id:'p1',zone:'일상적인 나 > 연인/파트너',zc:'#C2956C',title:'먼저 다가가지 못하는 패턴',desc:'연결을 원하지만 거절이 두려워 항상 기다려요.',from:'Get',intensity:4,
   frostTxt:'"회피-갈망 사이클. 4개 대화에서 반복됐어요. 어떻게 할지 정하는 게 먼저예요."'},
  {id:'p2',zone:'사회적인 나 > 직장/학교',zc:'#7BA8C4',title:'감정을 숨기는 직장에서의 나',desc:'직장에서는 항상 괜찮은 척해요. 지쳐있어도.',from:'Dig',intensity:3,
   frostTxt:'"사회적 가면이 두텁게 작동하고 있어요. 에너지 비용이 크게 쌓이고 있어요."'},
  {id:'p3',zone:'비밀스러운 나 > 감정적 비밀',zc:'#A07850',title:'혼자 삭이는 슬픔',desc:'슬플 때 아무에게도 말하지 못하고 혼자 버텨요.',from:'Get',intensity:5,
   frostTxt:'"고립 패턴. Vent 기록에서 5번 이상 등장했어요. 가장 오래된 패턴이에요."'},
];

var CD = {
  accept:{title:'받아들일게요',desc:'이런 나를 인정하고, 이대로도 괜찮다는 걸 알아가고 싶어요.',
    stages:[
      {lbl:'인식',title:'이 패턴에 이름 붙이기',text:'이 패턴을 한 문장으로 표현해보세요.',note:true,ai:'amber',aiTxt:'어떤 이름이든 괜찮아요. 이름을 붙이는 것만으로도 이미 달라진 거예요.'},
      {lbl:'이해',title:'이 패턴이 나를 어떻게 지켜왔는지',text:'모든 패턴은 한때 나를 보호하기 위해 생겼어요. 무엇을 지켜온 걸까요?',note:false,ai:'frost',aiTxt:'방어 기제는 약점이 아니에요. 과거의 해결책이 현재에 맞지 않는 것뿐이에요.'},
      {lbl:'통합',title:'이런 나와 함께 살아가는 방식',text:'받아들인다는 건 포기가 아니에요. 이 나와 함께 어떻게 살아갈 건가요?',note:true,ai:'amber',aiTxt:'여기까지 온 것만으로도 충분해요. 정말로요.'},
    ],badge:'받아들이기',ptitle:'있는 그대로의 나를 알아가는 3단계',psub:'Amber가 함께해요.'},
  change:{title:'바꿀게요',desc:'이 패턴을 알았으니, 이제 다르게 반응하고 싶어요.',
    stages:[
      {lbl:'관찰',title:'패턴이 언제 나타나는지 포착하기',text:'다음번에 이 패턴이 작동할 때 그 순간을 알아채보세요.',note:false,ai:'amber',aiTxt:'알아채는 것만으로도 달라진 거예요.'},
      {lbl:'실험',title:'한 가지 작은 것만 다르게 해보기',text:'딱 한 가지만 다르게 해볼 것을 정해보세요.',note:true,ai:'frost',aiTxt:'작은 실험이 데이터가 돼요. 3주면 패턴이 바뀌기 시작해요.'},
      {lbl:'정착',title:'새로운 반응 패턴 만들기',text:'실험이 쌓이면 새로운 나의 방식이 돼요.',note:false,ai:'amber',aiTxt:'Frost가 함께 트래킹할 거예요. 혼자가 아니에요.'},
    ],badge:'바꿀게요',ptitle:'패턴을 바꾸는 3단계',psub:'Frost가 트래킹해요.'},
  leave:{title:'떠날게요',desc:'이 관계나 상황에서 벗어나는 것이 나에게 맞는 방향이에요.',
    stages:[
      {lbl:'명확화',title:'왜 떠나는지 나에게 솔직하게',text:'두려움 때문인지, 진짜 선택인지. 솔직하게 물어보세요.',note:false,ai:'amber',aiTxt:'어떤 이유든 괜찮아요. 솔직한 것이 먼저예요.'},
      {lbl:'작별',title:'이 관계가 준 것 인정하기',text:'떠난다고 과거가 의미 없어지는 게 아니에요. 무엇을 배웠나요?',note:true,ai:'frost',aiTxt:'떠남의 이유를 명확히 알수록 후회가 줄어요.'},
      {lbl:'시작',title:'다음 나를 위한 첫 걸음 정하기',text:'떠남은 끝이 아니에요. 그 첫 걸음은 무엇인가요?',note:true,ai:'amber',aiTxt:'슬픔은 의미가 있었다는 증거예요.'},
    ],badge:'떠날게요',ptitle:'새로운 시작을 위한 3단계',psub:'Amber와 Frost가 함께해요.'},
};

var FROST_SUGGESTS = {
  accept:'"받아들이는 것도 용기예요. 이 패턴이 왜 생겼는지 같이 봐요."',
  change:'"변화하기로 했군요. 어디서 시작할지 같이 잡아볼게요."',
  leave:'"떠나는 것도 선택이에요. 이유를 명확히 하면 후회가 줄어요."',
};

function renderPatterns(){
  var sc = document.getElementById('pattern-scroll'); sc.innerHTML='';
  PATTERNS.forEach(function(p,i){
    var d=document.createElement('div'); d.className='pattern-card fade-in'; d.style.animationDelay=(i*.07)+'s';
    var dots=''; for(var j=0;j<5;j++) dots+='<div class="'+(j<p.intensity?'pc-dot-fill':'pc-dot-empty')+'"></div>';
    var dotsLabel = '<span style="font-size:9px;color:#3C3835;margin-left:3px;">반복 빈도</span>';
    d.innerHTML='<div class="pc-zone-row"><div class="pc-zone-dot" style="background:'+p.zc+'"></div><div class="pc-zone-label">'+p.zone+'</div></div>'+
      '<div class="pc-pattern-title">'+p.title+'</div><div class="pc-pattern-desc">'+p.desc+'</div>'+
      '<div class="pc-meta"><div class="pc-from-tag">'+p.from+'</div><div class="pc-intensity">'+dots+dotsLabel+'</div><div class="pc-arrow">→</div></div>';
    d.onclick=function(){selectPattern(p);};
    sc.appendChild(d);
  });
}

function selectPattern(p){
  SEL_PAT=p; SEL_CHOICE=null;
  document.getElementById('spb-zdot').style.background=p.zc;
  document.getElementById('spb-text').textContent=p.title;
  document.getElementById('spb-from').textContent=p.from;
  document.getElementById('fb-text').textContent=p.frostTxt;
  document.getElementById('main-q-text').textContent='이 패턴과 어떻게 지낼 건가요?';
  renderChoiceCards();
  document.getElementById('proceed-btn').classList.remove('show');
  showView('choice');
}

function goBack(){showView('pattern');}

function renderChoiceCards(){
  var con=document.getElementById('choice-cards'); con.innerHTML='';
  ['accept','change','leave'].forEach(function(type){
    var cd=CD[type];
    var card=document.createElement('div'); card.className='choice-card'; card.id='cc-'+type;
    var stagesHtml=cd.stages.map(function(s,idx){
      var noteHtml=s.note?'<div class="si-note"><div class="si-note-lbl">메모</div><textarea class="si-note-ta" placeholder="여기에..."></textarea></div>':'';
      var aiHtml=s.ai==='amber'
        ?'<div class="amber-cmt"><div class="amber-cmt-name">Amber</div><div class="amber-cmt-text">'+s.aiTxt+'</div></div>'
        :'<div class="frost-cmt"><div class="frost-cmt-name">Frost</div><div class="frost-cmt-text">'+s.aiTxt+'</div></div>';
      return '<div class="stage-item" data-idx="'+idx+'">'
        +'<div class="si-top"><div class="si-num">'+(idx+1)+'</div><div class="si-lbl">'+s.lbl+'</div><div class="si-title">'+s.title+'</div></div>'
        +'<div class="si-body"><div class="si-body-text">'+s.text+'</div>'+noteHtml+aiHtml+'</div></div>';
    }).join('');
    card.innerHTML='<div class="cc-hdr"><div class="cc-title">'+cd.title+'</div><div class="cc-chk"><div class="cc-chk-in"></div></div></div>'
      +'<div class="cc-desc">'+cd.desc+'</div>'
      +'<div class="choice-expand"><div class="stage-list">'+stagesHtml+'</div></div>';
    card.onclick=function(e){
      if(e.target.closest('.stage-item')||e.target.tagName==='TEXTAREA') return;
      selectChoice(type,card);
    };
    card.querySelectorAll('.stage-item').forEach(function(si){
      si.onclick=function(e){
        e.stopPropagation();
        if(!card.classList.contains('selected')) return;
        if(e.target.tagName==='TEXTAREA') return;
        var was=si.classList.contains('open');
        card.querySelectorAll('.stage-item').forEach(function(s){s.classList.remove('open');});
        if(!was) si.classList.add('open');
      };
    });
    con.appendChild(card);
  });
}

function selectChoice(type,card){
  document.querySelectorAll('.choice-card').forEach(function(c){c.classList.remove('selected');});
  card.classList.add('selected');
  SEL_CHOICE=type;
  document.getElementById('fb-text').textContent=FROST_SUGGESTS[type];
  document.getElementById('proceed-btn').classList.add('show');
  setTimeout(function(){var sc=document.querySelector('.choice-scroll');if(sc)sc.scrollBy({top:80,behavior:'smooth'});},100);
}

function goPractice(){switchSec('practice',document.getElementById('stab-prac'));}

function renderPractice(){
  var empty=document.getElementById('prac-empty'), content=document.getElementById('prac-content');
  if(!SEL_CHOICE){
    empty.style.display='flex'; content.style.display='none'; return;
  }
  empty.style.display='none'; content.style.display='flex'; content.style.flexDirection='column'; content.style.flex='1'; content.style.overflow='hidden'; content.style.minHeight='0';
  var cd=CD[SEL_CHOICE];
  document.getElementById('ph-badge').textContent=cd.badge;
  document.getElementById('ph-title').textContent=cd.ptitle;
  document.getElementById('ph-sub').textContent=cd.psub;
  cd.stages.forEach(function(s,i){var el=document.getElementById('st'+(i+1)+'l');if(el)el.textContent=s.lbl;});
  [1,2,3].forEach(function(i){var el=document.getElementById('st'+i);if(el){el.classList.remove('done','active');if(i===1)el.classList.add('active');}});
  var list=document.getElementById('prac-list'); list.innerHTML='';
  cd.stages.forEach(function(s,idx){
    var d=document.createElement('div'); d.className='pcard fade-in'; d.style.animationDelay=(idx*.06)+'s';
    var noteHtml=s.note?'<div class="pcard-note"><div class="pcard-note-lbl">메모</div><textarea class="pcard-note-ta" placeholder="여기에..."></textarea></div>':'';
    d.innerHTML='<div class="pcard-head"><div class="pcard-chk"><div class="pcard-chk-mark">✓</div></div>'
      +'<div class="pcard-body"><div class="pcard-stage">'+s.lbl+'</div><div class="pcard-title">'+s.title+'</div><div class="pcard-desc">'+s.text+'</div></div></div>'
      +'<div class="pcard-expand">'+noteHtml+'</div>';
    d.querySelector('.pcard-chk').addEventListener('click',function(e){
      e.stopPropagation(); d.classList.toggle('done'); updateTracker();
    });
    d.querySelector('.pcard-head').addEventListener('click',function(e){
      if(e.target.closest('.pcard-chk')||e.target.tagName==='TEXTAREA') return;
      d.classList.toggle('open');
    });
    list.appendChild(d);
  });
  var me=document.createElement('div'); me.className='me-invite fade-in'; me.style.animationDelay=(cd.stages.length*.06)+'s';
  me.innerHTML='<div class="mi-lbl">다음 단계</div><div class="mi-text">여기서 한 선택과 실천이 Me에 쌓여요.</div><button class="mi-btn">Me에서 변화 보기</button>';
  list.appendChild(me);
}

function updateTracker(){
  var cards=document.querySelectorAll('#prac-list .pcard');
  var firstNotDone=-1;
  cards.forEach(function(c,i){if(firstNotDone===-1&&!c.classList.contains('done'))firstNotDone=i;});
  [1,2,3].forEach(function(i){
    var el=document.getElementById('st'+i); if(!el) return;
    el.classList.remove('done','active');
    var card=cards[i-1];
    if(card&&card.classList.contains('done')) el.classList.add('done');
    else if(i-1===firstNotDone) el.classList.add('active');
  });
}

var GROUPS=[
  {name:'바꾸기로 한 사람들 — 관찰자형',desc:'먼저 다가가지 못하는 패턴을 바꾸려는',count:143,matched:true,tags:['변화','관찰자'],entries:['오늘 처음으로 먼저 연락했어요. 떨렸지만 했어요.','작은 것부터 시작 중이에요.']},
  {name:'받아들이기로 한 사람들',desc:'있는 그대로의 나를 알아가는 과정',count:98,matched:false,tags:['수용','자기이해'],entries:['이런 나도 괜찮다는 걸 조금씩 믿고 있어요.']},
  {name:'떠나기로 한 사람들',desc:'새로운 시작을 선택한 사람들',count:67,matched:false,tags:['이별','새출발'],entries:['두렵지만 홀가분해요.']},
];
function renderGroups(){
  var list=document.getElementById('group-list'); list.innerHTML='';
  var matchMap={accept:'받아들이기',change:'바꿀게요',leave:'떠날게요'};
  var curMatch = SEL_CHOICE ? matchMap[SEL_CHOICE] : null;
  GROUPS.forEach(function(g,i){
    var isMatched = curMatch ? g.name.indexOf(curMatch.replace('게요','')) > -1 || (curMatch==='받아들이기' && g.name.indexOf('받아들이기') > -1) || (curMatch==='떠날게요' && g.name.indexOf('떠나기') > -1) || (curMatch==='바꿀게요' && g.name.indexOf('바꾸기') > -1) : g.matched;
    var d=document.createElement('div'); d.className='gcard fade-in'+(isMatched?' matched':''); d.style.animationDelay=(i*.06)+'s';
    d.innerHTML='<div class="gc-top"><div class="gc-name">'+g.name+'</div><div class="gc-cnt">'+g.count+'명</div></div>'
      +'<div class="gc-desc">'+g.desc+'</div>'
      +'<div class="gc-tags">'+(g.matched?'<span class="gc-badge">내 선택</span>':'')+g.tags.map(function(t){return'<span class="gc-tag">'+t+'</span>';}).join('')+'</div>'
      +'<div class="gc-entries"><div style="font-size:9px;color:#3C3835;margin-bottom:5px;">읽는 공간이에요.</div>'+g.entries.map(function(e){return'<div class="gc-entry">'+e+'</div>';}).join('')+'</div>';
    d.onclick=function(){d.classList.toggle('open');};
    list.appendChild(d);
  });
}

function showView(name){
  ['v-pattern','v-choice','v-practice','v-comm'].forEach(function(id){
    var el=document.getElementById(id); if(!el) return;
    el.style.display='none'; el.classList.remove('active');
  });
  var map={pattern:'v-pattern',choice:'v-choice',practice:'v-practice',community:'v-comm'};
  var el=document.getElementById(map[name]||'v-pattern');
  if(el){el.style.display='flex';el.classList.add('active');}
}

function switchSec(name,tab){
  document.querySelectorAll('.stab').forEach(function(t){t.classList.remove('on');});
  if(tab) tab.classList.add('on');
  if(name==='pattern'){showView('pattern');renderPatterns();}
  else if(name==='practice'){showView('practice');renderPractice();}
  else if(name==='community'){showView('community');renderGroups();}
}

// AI SHEET
var SD={
  amber:{cls:'amber',name:'엠버',role:'비서 Amber',
    init:{text:'어떤 선택을 하든 — 그 선택을 하는 사람으로 같이 걸어갈게요.',tone:'따뜻하게 지지해요'},
    replies:[{text:'그 감정, 충분히 느껴도 돼요.',tone:'공감해요'},{text:'작은 것부터 시작해요. 작은 게 더 오래가요.',tone:'격려해요'},{text:'오늘 어땠어요?',tone:'함께 있어요'}]},
  frost:{cls:'frost',name:'프로스트',role:'닥터 Frost',
    init:{text:'패턴을 선택했군요. 이제 어떻게 작동하는지 같이 봐요.',tone:'냉철하게 분석해요'},
    replies:[{text:'이 반응이 몇 번이나 반복됐어요?',tone:'정확하게 짚어요'},{text:'변화는 알아채는 것에서 시작해요.',tone:'패턴을 추적해요'},{text:'3주면 바뀌기 시작해요.',tone:'냉철하게 지지해요'}]},
};
function openSheet(type){
  CUR_SHEET=type; var data=SD[type];
  var av=document.getElementById('sav'),nm=document.getElementById('sname'),rl=document.getElementById('srole');
  var chat=document.getElementById('ai-chat'),send=document.getElementById('ai-send'),field=document.getElementById('ai-field');
  av.className='sav '+data.cls; nm.textContent=data.name; rl.textContent=data.role;
  send.className='ai-send '+data.cls; field.placeholder=data.name+'에게 말해요...';
  chat.innerHTML='';
  if(HIST[type].length===0){
    var m=document.createElement('div'); m.className='amsg '+type;
    m.innerHTML='<div class="amsg-text">'+data.init.text+'</div><div class="amsg-tone">'+data.init.tone+'</div>';
    chat.appendChild(m); HIST[type].push({r:'ai',t:data.init.text,tone:data.init.tone});
  } else {
    HIST[type].forEach(function(h){
      var d=document.createElement('div');
      if(h.r==='ai'){d.className='amsg '+type;d.innerHTML='<div class="amsg-text">'+h.t+'</div><div class="amsg-tone">'+h.tone+'</div>';}
      else{d.className='umsg';d.innerHTML='<div class="umsg-text">'+h.t+'</div>';}
      chat.appendChild(d);
    });
  }
  document.getElementById('ai-ov').classList.add('show');
  document.getElementById('ai-sheet').classList.add('show');
  setTimeout(function(){chat.scrollTop=chat.scrollHeight;field.focus();},360);
}
function closeSheet(){
  document.getElementById('ai-ov').classList.remove('show');
  document.getElementById('ai-sheet').classList.remove('show');
}
function sendMsg(){
  var f=document.getElementById('ai-field'),v=f.value.trim(); if(!v) return;
  var chat=document.getElementById('ai-chat'),type=CUR_SHEET||'amber';
  var ud=document.createElement('div'); ud.className='umsg';
  ud.innerHTML='<div class="umsg-text">'+v+'</div>';
  chat.appendChild(ud); HIST[type].push({r:'user',t:v}); f.value=''; chat.scrollTop=chat.scrollHeight;
  var data=SD[type];
  setTimeout(function(){
    var r=data.replies[Math.floor(Math.random()*data.replies.length)];
    var ad=document.createElement('div'); ad.className='amsg '+type;
    ad.innerHTML='<div class="amsg-text">'+r.text+'</div><div class="amsg-tone">'+r.tone+'</div>';
    chat.appendChild(ad); HIST[type].push({r:'ai',t:r.text,tone:r.tone}); chat.scrollTop=chat.scrollHeight;
  },700);
}
document.getElementById('ai-field').addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});
function navTo(btn){document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');}

renderPatterns();

(function(){
  function flash(){
    var btn=document.querySelector('.amber-btn');
    if(btn){btn.classList.remove('flashing');void btn.offsetWidth;btn.classList.add('flashing');
    btn.addEventListener('animationend',function(){btn.classList.remove('flashing');},{once:true});}
    setTimeout(flash,9000+Math.random()*13000);
  }
  setTimeout(flash,5000+Math.random()*4000);
})();
</script>
