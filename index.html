<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>VEILOR — 관계의 베일을 벗기다</title>
    <meta name="description" content="AI 기반 관계 심리 자기탐색 플랫폼" />
    <meta name="author" content="VEILOR" />
    <meta name="theme-color" content="#1C1917" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VEILOR" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" /></noscript>

    <meta property="og:title" content="VEILOR — 관계의 베일을 벗기다" />
    <meta property="og:description" content="AI 기반 관계 심리 자기탐색 플랫폼" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://veilor.ai" />
    <meta property="og:image" content="https://veilor.ai/icon-512x512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@veilor_ai" />
    <meta name="twitter:image" content="https://veilor.ai/icon-512x512.png" />
  </head>

  <body>
    <div id="root">
      <div id="app-shell" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1C1917;">
        <div style="text-align:center;">
          <div style="font-size:2rem;font-weight:300;letter-spacing:0.2em;color:#E0B48A;margin-bottom:1rem;">V</div>
          <div style="width:32px;height:2px;background:#E0B48A30;margin:0 auto;overflow:hidden;border-radius:1px;">
            <div style="width:50%;height:100%;background:#E0B48A;animation:vl 1.2s ease-in-out infinite;"></div>
          </div>
        </div>
      </div>
    </div>
    <style>#app-shell{opacity:1;transition:opacity 0.2s}@keyframes vl{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}</style>
    <script>window.addEventListener('DOMContentLoaded',function(){var s=document.getElementById('app-shell');if(s)s.style.opacity='0';})</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
